<section class="max-w-7xl mx-auto px-4 py-16 md:py-24">
  <div class="flex justify-between items-end mb-10 md:mb-14">
    <h2 class="text-3xl md:text-5xl font-[1000] uppercase tracking-tighter leading-none text-black">
      Our Happy Customers
    </h2>
    <div class="flex gap-3">
      <button class="w-10 h-10 rounded-full border border-gray-100 flex items-center justify-center hover:bg-gray-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button class="w-10 h-10 rounded-full border border-gray-100 flex items-center justify-center hover:bg-gray-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
    <div *ngFor="let f of [1,2,3]" class="border border-black/5 p-7 md:p-8 rounded-[20px] bg-white transition-all hover:shadow-sm">
      <div class="flex text-yellow-400 mb-3 text-lg space-x-1">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>
      <div class="flex items-center gap-2 mb-3">
        <span class="font-bold text-lg md:text-xl text-black">Sarah M.</span>
        <div class="w-5 h-5 bg-[#01AB31] rounded-full flex items-center justify-center">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>
        </div>
      </div>
      <p class="text-black/60 leading-[1.6] text-sm md:text-base">
        "I'm blown away by the quality and style of the clothes I received from Shop.co. From casual wear to elegant dresses, every piece I've bought has exceeded my expectations."
      </p>
    </div>
  </div>
</section>
