<footer class="bg-[#F0F0F0] relative mt-40 pt-36 pb-12 w-full">
  
  <div class="max-w-7xl mx-auto px-4 absolute left-0 right-0 -top-32 md:-top-24 z-[100]">
    <div class="bg-black rounded-[20px] px-6 py-9 md:px-16 md:py-10 shadow-2xl border border-white/10">
      <div class="grid grid-cols-1 lg:grid-cols-2 items-center gap-8">
        
        <div class="w-full block">
          <h2 class="!text-white text-3xl md:text-[40px] font-[900] leading-[1.1] tracking-tighter uppercase italic">
            STAY UP TO DATE ABOUT OUR LATEST OFFERS
          </h2>
        </div>
        
        <div class="w-full max-w-[350px] lg:ml-auto flex flex-col gap-3">
          <div class="relative w-full">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 z-10">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7 8.5L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </span>
            <input type="email" placeholder="Enter your email address" 
              class="w-full h-12 pl-12 rounded-full text-sm focus:outline-none placeholder:text-gray-400 text-black bg-white border-none">
          </div>
          
          <button class="w-full h-12 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition-all text-sm uppercase">
            Subscribe to Newsletter
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 relative z-10">
     </div>

  <div class="max-w-7xl mx-auto px-4 relative z-10">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-y-12 gap-x-8 border-b border-black/10 pb-12">
      <div class="col-span-2 md:col-span-1">
        <h2 class="text-3xl font-[1000] mb-6 text-black italic tracking-tighter uppercase">SHOP.CO</h2>
        <p class="text-black/60 text-sm leading-relaxed mb-8">
          We have clothes that suits your style and which you're proud to wear. From women to men.
        </p>
        <div class="flex gap-3">
          <a *ngFor="let s of [1,2,3,4]" href="#" class="w-8 h-8 rounded-full border border-black/10 bg-white flex items-center justify-center hover:bg-black hover:text-white transition-all text-[10px] text-blue-500">●</a>
        </div>
      </div>

      <div *ngFor="let section of footerSections">
        <h3 class="font-bold mb-6 text-sm uppercase tracking-[0.2em] text-black">{{section.title}}</h3>
        <ul class="space-y-4">
          <li *ngFor="let link of section.links">
            <a href="#" class="text-black/60 text-sm md:text-base hover:text-black transition-colors">{{link}}</a>
          </li>
        </ul>
      </div>
    </div>

    <div class="pt-8 flex flex-col md:flex-row justify-between items-center gap-6">
      <p class="text-black/60 text-sm">Shop.co © 2000-2023, All Rights Reserved</p>
      <div class="flex gap-2">
        <div *ngFor="let p of [1,2,3,4,5]" class="w-12 h-8 bg-white rounded border border-gray-100 flex items-center justify-center shadow-sm">
           <span class="text-[8px] font-bold italic text-black">CARD</span>
        </div>
      </div>
    </div>
  </div>
</footer>
