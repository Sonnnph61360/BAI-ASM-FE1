<div class="flex justify-between items-center mb-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Chỉnh Sửa Sản Phẩm</h2>
        <span class="text-gray-400 text-sm italic">ID: #{{id}}</span>

    </div>
    <form nz-form [formGroup]="productform" (ngSubmit)="onSubmit()">
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Tên sản phẩm</nz-form-label>
            <nz-form-control [nzSpan]="18"
                nzErrorTip="Vui lòng nhập tên sản phẩm!">
                <input nz-input formControlName="name" />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Link hình ảnh</nz-form-label>
            <nz-form-control [nzSpan]="18" nzErrorTip="Vui lòng nhập link ảnh!">
                <input nz-input formControlName="image" />
                <div class="mt-2" *ngIf="productform.get('image')?.value">
                    <p class="text-xs text-gray-400 mb-1">Xem trước:</p>
                    <img [src]="productform.get('image')?.value"
                        class="h-20 w-20 object-cover rounded border">
                </div>
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Giá tiền</nz-form-label>
            <nz-form-control [nzSpan]="18" nzErrorTip="Giá tối thiểu 1,000đ!">
                <input nz-input type="number" formControlName="price" />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Danh mục</nz-form-label>
            <nz-form-control [nzSpan]="18">
                <nz-select formControlName="categoryId">
                    <nz-option *ngFor="let cat of categories" [nzValue]="cat.id"
                        [nzLabel]="cat.name"></nz-option>
                </nz-select>
                <input nz-input formControlName="name" />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6">Mô tả</nz-form-label>
            <nz-form-control [nzSpan]="18">
                <textarea nz-input formControlName="description"
                    [nzAutosize]="{ minRows: 3 }"></textarea>
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-control [nzOffset]="6" [nzSpan]="18">
                <button nz-button nzType="primary"
                    [disabled]="productform.invalid" class="bg-blue-600">
                    Lưu thay đổi
                </button>
                <button nz-button nzType="default" type="button" class="ml-2"
                    (click)="router.navigate(['/admin/products'])">
                    Hủy bỏ
                </button>
            </nz-form-control>
        </nz-form-item>
    </form>
</div>
