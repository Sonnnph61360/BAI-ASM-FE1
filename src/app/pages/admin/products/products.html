<div class="overflow-x-auto rounded-lg border border-gray-200 shadow-md m-5">
  <table
    class="w-full border-collapse bg-white text-left text-sm text-gray-500">
    <thead class="bg-gray-50">
      <tr>
        <th scope="col" class="px-6 py-4 font-medium text-gray-900">ID</th>
        <th scope="col" class="px-6 py-4 font-medium text-gray-900">Hình
          ảnh</th>
        <th scope="col" class="px-6 py-4 font-medium text-gray-900">Tên sản
          phẩm</th>
        <th scope="col" class="px-6 py-4 font-medium text-gray-900">Giá</th>
        <th scope="col" class="px-6 py-4 font-medium text-gray-900">Danh mục
          ID</th>
        <th scope="col" class="px-6 py-4 font-medium text-gray-900">Thao
          tác</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100 border-t border-gray-100">
      @for (item of products; track item.id) {
      <tr class="hover:bg-gray-50 transition">
        <td class="px-6 py-4">#{{ item.id }}</td>
        <td class="px-6 py-4">
          <img [src]="item.image" [alt]="item.name"
            class="h-12 w-12 object-cover rounded-md border">
        </td>
        <td class="px-6 py-4 font-medium text-gray-900">{{ item.name }}</td>
        <td class="px-6 py-4">
          <span class="text-green-600 font-semibold">{{ item.price | number
            }}đ</span>
        </td>
        <td class="px-6 py-4 text-center">
          <span
            class="inline-flex items-center gap-1 rounded-full bg-blue-50 px-2 py-1 text-xs font-semibold text-blue-600">
            {{ item.categoryId }}
          </span>
        </td>
        <td class="px-6 py-4">
          <div class="flex gap-2">
            <button
              (click)="handleDelete(item.id)"
              class="bg-red-500 text-white px-3 py-1.5 rounded text-xs hover:bg-red-600 transition shadow-sm">
              Xóa
            </button>
            <a
              [routerLink]="['/admin/productedit', item.id]"
              class="bg-blue-500 text-white px-3 py-1.5 rounded text-xs hover:bg-blue-600 transition shadow-sm no-underline inline-block">
              Sửa
            </a>
          </div>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
