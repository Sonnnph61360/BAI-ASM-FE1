<div class="max-w-2xl mx-auto p-6 bg-white shadow-lg rounded-lg mt-10">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Thêm Sản Phẩm Mới</h2>
    <form nz-form [formGroup]="productform" (ngSubmit)="onSubmit()">
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Tên sản phẩm</nz-form-label>
            <nz-form-control [nzSpan]="18"
                nzErrorTip="Vui lòng nhập tên sản phẩm ít nhất 3 ký tự!">
                <input nz-input formControlName="name"
                    placeholder="Ví dụ: Áo hoodie nam..." />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Link hình ảnh</nz-form-label>
            <nz-form-control [nzSpan]="18" nzErrorTip="Vui lòng nhập link ảnh!">
                <input nz-input formControlName="image"
                    placeholder="https://..." />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Giá tiền</nz-form-label>
            <nz-form-control [nzSpan]="18"
                nzErrorTip="Giá phải lớn hơn 1,000đ!">
                <input nz-input type="number" formControlName="price" />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6" nzRequired>Danh mục</nz-form-label>
            <nz-form-control [nzSpan]="18" nzErrorTip="Vui lòng chọn danh mục!">
                <nz-select formControlName="categoryId"
                    nzPlaceHolder="Chọn một danh mục">
                    <nz-option *ngFor="let cat of categories" [nzValue]="cat.id"
                        [nzLabel]="cat.name"></nz-option>
                </nz-select>
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label [nzSpan]="6">Mô tả</nz-form-label>
            <nz-form-control [nzSpan]="18">
                <textarea nz-input formControlName="description"
                    [nzAutosize]="{ minRows: 3, maxRows: 5 }"></textarea>
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-control [nzOffset]="6" [nzSpan]="18">
                <button nz-button nzType="primary"
                    [disabled]="productform.invalid" class="mr-2">
                    Thêm sản phẩm
                </button>
                <button nz-button nzType="default" type="button"
                    (click)="productform.reset()">
                    Nhập lại
                </button>
            </nz-form-control>
        </nz-form-item>
    </form>
</div>
